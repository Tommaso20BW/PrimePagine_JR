name: Invia Prime Pagine Giornaliere

on:
  schedule:
    # Impostiamo il bot direttamente sull'orario italiano!
    - cron: '32 4 * * *'
      timezone: 'Europe/Rome'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Controlla il codice della repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Abilita la cache automatica per i requisiti

      - name: Installa le dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui il Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
