name: Invia Prime Pagine Giornaliere

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: prime-pagine-giornaliere
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Controlla il codice della repository
        uses: actions/checkout@v5

      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Installa le dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui il Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u bot.py

      - name: Pulisci la cronologia dei run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: "0"   # 0 = cancella TUTTI i run precedenti; resta visibile solo quello in corso
                      # (un run non puo' cancellare se' stesso mentre gira: limite di GitHub)
        run: |
          # Cancella i run COMPLETATI di questo stesso workflow,
          # tenendo solo gli ultimi $KEEP.
          gh api "repos/${{ github.repository }}/actions/workflows/start.yml/runs?status=completed&per_page=100" \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .['"$KEEP"':] | .[].id' |
          while read -r RUN_ID; do
            echo "Elimino run $RUN_ID"
            gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$RUN_ID" || true
          done
          echo "Pulizia completata."
